---
layout: default
---

<article>
  <header class="post-header">
    <div class="when">{{ page.date | date: "%Y.%m.%d" }}</div>
    <h1>{{ page.title }}</h1>
    {%- if page.tags.size > 0 %}
    <div class="tags">
      {%- for tag in page.tags %}<span>{{ tag }}</span>{% endfor %}
    </div>
    {%- endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>

<a class="back" href="{{ '/blog/' | relative_url }}">← All posts</a>
