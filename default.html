<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=Noto+Sans+TC:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
{% feed_meta %}

{%- if page.math %}
<script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']]}};</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{%- endif %}
</head>
<body>
<div class="wrap">

  <aside class="rail">
    <div>
      <div class="name">
        <a href="{{ '/' | relative_url }}">Yun-Chieh (Rae) Hsu</a>
        <span class="zh">許芸婕</span>
      </div>
      <div class="affil">
        Research Assistant<br>
        Brain-Computer Interface Lab<br>
        CITI, Academia Sinica
      </div>
    </div>

    <nav>
      <div class="nav-out" style="border-top:none; padding-top:0; margin-top:36px">
        <a href="{{ '/' | relative_url }}">← Home</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
      </div>
    </nav>

    <div class="rail-foot">Updated 2026.07</div>
  </aside>

  <main>
    {{ content }}
  </main>

</div>
</body>
</html>
